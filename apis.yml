aid: microsoft-sharepoint
url: https://raw.githubusercontent.com/api-evangelist/microsoft-sharepoint/refs/heads/main/apis.yml
apis:
  - aid: microsoft-sharepoint:rest-api
    name: SharePoint REST API
    tags:
      - SharePoint
      - Content Management
      - Collaboration
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://{tenant}.sharepoint.com/_api/
    humanURL: https://learn.microsoft.com/en-us/sharepoint/dev/sp-add-ins/get-to-know-the-sharepoint-rest-service
    properties:
      - url: https://learn.microsoft.com/en-us/sharepoint/dev/sp-add-ins/get-to-know-the-sharepoint-rest-service
        type: Documentation
      - url: https://learn.microsoft.com/en-us/sharepoint/dev/apis/sharepoint-rest-graph
        type: API Reference
    description: >-
      The SharePoint REST API provides direct access to SharePoint sites,
      lists, libraries, items, and other resources using OData endpoints.
      Developers can perform CRUD operations on SharePoint content, manage
      site structures, work with content types, and interact with search
      and taxonomy services.
  - aid: microsoft-sharepoint:graph-sites-api
    name: Microsoft Graph SharePoint Sites API
    tags:
      - SharePoint
      - Microsoft Graph
      - Sites
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0/
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/sharepoint
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/sharepoint
        type: Documentation
    description: >-
      The Microsoft Graph SharePoint Sites API provides access to SharePoint
      sites, lists, and document libraries through the unified Microsoft
      Graph endpoint. It enables developers to manage site content, list
      items, drive items, and site permissions using a consistent REST
      interface alongside other Microsoft 365 services.
  - aid: microsoft-sharepoint:webhooks-api
    name: SharePoint Webhooks API
    tags:
      - SharePoint
      - Webhooks
      - Events
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://{tenant}.sharepoint.com/_api/
    humanURL: https://learn.microsoft.com/en-us/sharepoint/dev/apis/webhooks/overview-sharepoint-webhooks
    properties:
      - url: https://learn.microsoft.com/en-us/sharepoint/dev/apis/webhooks/overview-sharepoint-webhooks
        type: Documentation
    description: >-
      The SharePoint Webhooks API enables applications to subscribe to
      change notifications on SharePoint lists and libraries. When items
      are created, updated, or deleted, SharePoint sends notifications to
      registered webhook endpoints, enabling real-time event-driven
      integrations without polling.
  - aid: microsoft-sharepoint:search-api
    name: SharePoint Search REST API
    tags:
      - SharePoint
      - Search
      - Content Discovery
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://{tenant}.sharepoint.com/_api/search/
    humanURL: https://learn.microsoft.com/en-us/sharepoint/dev/general-development/sharepoint-search-rest-api-overview
    properties:
      - url: https://learn.microsoft.com/en-us/sharepoint/dev/general-development/sharepoint-search-rest-api-overview
        type: Documentation
    description: >-
      The SharePoint Search REST API provides full-text search capabilities
      across SharePoint content including sites, lists, libraries, and
      documents. It supports keyword query language, query refinement,
      result sorting, and content source targeting for comprehensive
      enterprise search scenarios.
  - aid: microsoft-sharepoint:framework
    name: SharePoint Framework (SPFx)
    tags:
      - SharePoint
      - Framework
      - Web Parts
      - Extensions
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://learn.microsoft.com/en-us/sharepoint/dev/spfx/sharepoint-framework-overview
    properties:
      - url: https://learn.microsoft.com/en-us/sharepoint/dev/spfx/sharepoint-framework-overview
        type: Documentation
    description: >-
      The SharePoint Framework (SPFx) is a development model for building
      client-side web parts, extensions, and adaptive card extensions for
      SharePoint and Microsoft Teams. It uses modern web technologies
      including TypeScript, React, and Node.js to create customizations
      that run in the context of SharePoint pages.
